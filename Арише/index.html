<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Для моей любимой ❤️</title>
    <!-- Шрифт -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Анимированный фон -->
    <div class="background"></div>
    <!-- Летающие сердечки -->
    <div id="hearts-container"></div>
    <!-- Частицы -->
    <div id="particles"></div>
    <!-- Основной блок -->
    <div class="container">
        <h1>💖 Ты меня любишь? 💖</h1>
        <div class="buttons">
            <button id="yesBtn">Да ❤️</button>
            <button id="noBtn">Нет 💔</button>
        </div>
    </div>
    <!-- Блок после нажатия "Да" -->
    <div id="loveSection">
        <h1 class="love-title">
            💕 Я тебя тоже люблю 💕
        </h1>
        <p class="days">
            Мы вместе уже
            <span id="daysCounter"></span>
        </p>
        <!-- Фото -->
        <div class="photo-gallery">
        <div class="photo active">
            <img src="photo1.jpg" alt="">
        </div>

        <div class="photo">
            <img src="photo2.jpg" alt="">
        </div>

        <div class="photo">
            <img src="photo3.jpg" alt="">
        </div>

        <div class="photo">
            <img src="photo4.jpg" alt="">
        </div>

        <div class="photo">
            <img src="photo5.jpg" alt="">
        </div>

        <div class="photo">
            <img src="photo6.jpg" alt="">
        </div>
        </div>
        <!-- Сердечко с фразами -->
        <div class="heart-button">
            ❤️
        </div>
        <div class="phrase">
            Ты самое лучшее, что со мной случилось ❤️
        </div>
        <!-- Финальная надпись -->
        <div class="forever">
            И это только начало нашей истории ❤️
            

  

  Навсегда? 💍
        </div>
    </div>
    <!-- Музыка -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
